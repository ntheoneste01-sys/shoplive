<!DOCTYPE html>
<html>
<head>
  <title>SHOPLIVE</title>
  <style>
    body {
      margin:0;
      background:black;
      color:white;
      font-family: Arial;
    }

    .video {
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      padding:20px;
      position:relative;
    }

    .actions {
      position:absolute;
      right:15px;
      bottom:100px;
      display:flex;
      flex-direction:column;
    }

    button {
      margin:10px;
      padding:12px;
      border:none;
      border-radius:50%;
      background:#007BFF;
      color:white;
      font-size:16px;
    }

    h2 {
      margin:0;
    }
  </style>
</head>

<body>

<div class="video">
  <h2>🔥 Live Product</h2>
  <p>Buy this product now instantly</p>

  <div class="actions">
    <button>❤️</button>
    <button>💬</button>
    <button>🛒</button>
  </div>
</div>

</body>
</html>
