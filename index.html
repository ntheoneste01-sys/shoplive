<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SHOPLIVE</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.feed {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.video-container {
  position: relative;
  height: 100vh;
  width: 100%;
  scroll-snap-align: start;
}

.video-container video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Overlay */
.overlay {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  width: 100%;
}

/* Right buttons */
.right {
  position: absolute;
  right: 10px;
  bottom: 80px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.right button {
  background: rgba(0,0,0,0.5);
  border: none;
  color: white;
  font-size: 18px;
  padding: 12px;
  border-radius: 50%;
  cursor: pointer;
}

/* Bottom text */
.bottom {
  position: absolute;
  left: 10px;
  bottom: 20px;
  color: white;
}

.bottom h4 {
  margin: 0;
}

.bottom p {
  margin: 5px 0 0;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="feed">

  <!-- VIDEO 1 -->
  <div class="video-container">
    <video src="https://www.w3schools.com/html/movie.mp4" muted loop></video>

    <div class="overlay">
      <div class="right">
        <button>❤️</button>
        <button>💬</button>
        <button>⭐</button>
        <button>🔗</button>
      </div>

      <div class="bottom">
        <h4>@shoplive</h4>
        <p>Best product deals 🔥</p>
      </div>
    </div>
  </div>

  <!-- VIDEO 2 -->
  <div class="video-container">
    <video src="https://www.w3schools.com/html/movie.mp4" muted loop></video>

    <div class="overlay">
      <div class="right">
        <button>❤️</button>
        <button>💬</button>
        <button>⭐</button>
        <button>🔗</button>
      </div>

      <div class="bottom">
        <h4>@seller</h4>
        <p>Flash sale today 💰</p>
      </div>
    </div>
  </div>

</div>

<script>
const videos = document.querySelectorAll("video");

function playVisibleVideo() {
  videos.forEach(video => {
    const rect = video.getBoundingClientRect();
    if (rect.top >= 0 && rect.bottom <= window.innerHeight) {
      video.play();
    } else {
      video.pause();
    }
  });
}

window.addEventListener("scroll", playVisibleVideo);
window.addEventListener("load", playVisibleVideo);
</script>

</body>
</html>
