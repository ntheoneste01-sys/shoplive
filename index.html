<!DOCTYPE html>
<html>
<head>
  <title>SHOPLIVE</title>
  <style>
    body {
      margin:0;
      background:black;
      font-family: Arial;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .video {
      height:100vh;
      scroll-snap-align: start;
      position:relative;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      padding:20px;
      color:white;
    }

    video {
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      top:0;
      left:0;
      z-index:-1;
    }

    .overlay {
      z-index:2;
    }

    .actions {
      position:absolute;
      right:15px;
      bottom:100px;
      display:flex;
      flex-direction:column;
      z-index:2;
    }

    button {
      margin:10px;
      padding:12px;
      border:none;
      border-radius:50%;
      background:#007BFF;
      color:white;
      font-size:16px;
    }
  </style>
</head>

<body>

<div class="video">
  <video autoplay loop muted>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  </video>

  <div class="overlay">
    <h2>🔥 Live Product 1</h2>
    <p>Buy instantly while watching</p>
  </div>

  <div class="actions">
    <button>❤️</button>
    <button>💬</button>
    <button>🛒</button>
  </div>
</div>

<div class="video">
  <video autoplay loop muted>
    <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
  </video>

  <div class="overlay">
    <h2>🔥 Live Product 2</h2>
    <p>Limited offer</p>
  </div>

  <div class="actions">
    <button>❤️</button>
    <button>💬</button>
    <button>🛒</button>
  </div>
</div>

</body>
</html>
