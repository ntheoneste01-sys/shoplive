  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .feed {
      height: 100vh;
      width: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .video {
      position: relative;
      width: 100%;
      height: 100vh;
      scroll-snap-align: start;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Overlay buttons (example) */
    .overlay {
      position: absolute;
      bottom: 20px;
      right: 20px;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 10;
    }

    .overlay button {
      background: rgba(0,0,0,0.5);
      border: none;
      color: white;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="feed">
    <div class="video">
      <video autoplay loop muted>
        <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
      </video>
      <div class="overlay">
        <button>❤️</button>
        <button>💬</button>
        <button>⭐</button>
      </div>
    </div>

    <div class="video">
      <video autoplay loop muted>
        <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
      </video>
      <div class="overlay">
        <button>❤️</button>
        <button>💬</button>
        <button>⭐</button>
      </div>
    </div>

    <!-- Ongera video uko ushaka -->
  </div>

  <script>
    // Auto-play only visible video
    const videos = document.querySelectorAll('video');

    function checkVisibleVideo() {
      videos.forEach(video => {
        const rect = video.getBoundingClientRect();
        if(rect.top >= 0 && rect.bottom <= window.innerHeight){
          video.play();
        } else {
          video.pause();
        }
      });
    }

    window.addEventListener('scroll', checkVisibleVideo);
    window.addEventListener('load', checkVisibleVideo);
  </script>

</body>
</html>
