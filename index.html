<!DOCTYPE html>
<html>
<head>
  <title>SHOPLIVE</title>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBmBE6bKr7P4SdP-iFkCDSqN35WPLL3EHA",
      authDomain: "shoplive-7033f.firebaseapp.com",
      projectId: "shoplive-7033f",
      storageBucket: "shoplive-7033f.firebasestorage.app",
      messagingSenderId: "287976562988",
      appId: "1:287976562988:web:69f3cbfb2ff085f1170c89"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.addEventListener('load', () => {
      const signupBtn = document.getElementById('signup');
      const loginBtn = document.getElementById('login');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const authMessage = document.getElementById('auth-message');

      signupBtn.addEventListener('click', () => {
        createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
          .then((userCredential) => {
            authMessage.textContent = "Account created! Welcome!";
            document.getElementById('auth-container').style.display = 'none';
          })
          .catch((error) => {
            authMessage.textContent = error.message;
          });
      });

      loginBtn.addEventListener('click', () => {
        signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
          .then((userCredential) => {
            authMessage.textContent = "Logged in successfully!";
            document.getElementById('auth-container').style.display = 'none';
          })
          .catch((error) => {
            authMessage.textContent = error.message;
          });
      });

      document.getElementById('logout').addEventListener('click', () => {
        signOut(auth);
      });

      onAuthStateChanged(auth, (user) => {
        if(user){
          document.getElementById('auth-container').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';
        } else {
          document.getElementById('auth-container').style.display = 'block';
          document.getElementById('dashboard').style.display = 'none';
        }
      });

      // Auto-play visible video
      const videos = document.querySelectorAll('video');
      function checkVisibleVideo() {
        videos.forEach(video => {
          const rect = video.getBoundingClientRect();
          if(rect.top >= 0 && rect.bottom <= window.innerHeight){
            video.play();
          } else {
            video.pause();
          }
        });
      }
      window.addEventListener('scroll', checkVisibleVideo);
      window.addEventListener('load', checkVisibleVideo);
    });
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    /* Feed vertical like TikTok */
    .feed {
      height: 100vh;
      width: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .video {
      position: relative;
      width: 100%;
      height: 100vh;
      scroll-snap-align: start;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Overlay buttons for video */
    .overlay {
      position: absolute;
      bottom: 20px;
      right: 20px;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 10;
    }

    .overlay button {
      background: rgba(0,0,0,0.5);
      border: none;
      color: white;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
    }

    /* Signup / Login */
    #auth-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      color: white;
      text-align: center;
      background: rgba(0,0,0,0.6);
      padding: 30px;
      border-radius: 10px;
    }

    #auth-container input {
      margin: 5px 0;
      padding: 10px;
      width: 200px;
      border-radius: 5px;
      border: none;
    }

    #auth-container button {
      margin: 5px;
      padding: 10px 20px;
      border-radius: 5px;
      border: none;
      background: #007BFF;
      color: white;
      cursor: pointer;
    }

    /* Dashboard */
    #dashboard {
      display: none;
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      z-index: 20;
    }

    #dashboard button {
      margin: 5px;
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      background: #007BFF;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Signup / Login -->
  <div id="auth-container">
    <h2>SHOPLIVE Login / Signup</h2>
    <input type="email" id="email" placeholder="Email" /><br/>
    <input type="password" id="password" placeholder="Password" /><br/>
    <button id="signup">Sign Up</button>
    <button id="login">Login</button>
    <p id="auth-message"></p>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <h3>Welcome to SHOPLIVE Dashboard</h3>
    <button id="start-live">Start Live</button>
    <button id="logout">Logout</button>
  </div>

  <!-- Video feed -->
  <div class="feed">
    <div class="video">
      <video autoplay loop muted>
        <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
      </video>
      <div class="overlay">
        <button>❤️</button>
        <button>💬</button>
        <button>⭐</button>
      </div>
    </div>

    <div class="video">
      <video autoplay loop muted>
        <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
      </video>
      <div class="overlay">
        <button>❤️</button>
        <button>💬</button>
        <button>⭐</button>
      </div>
    </div>

    <!-- Add more videos as needed -->
  </div>

</body>
</html>
